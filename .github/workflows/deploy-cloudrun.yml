name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker me-west1-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository (if not exists)
        run: |
          gcloud artifacts repositories create hasheket-runner \
            --repository-format=docker \
            --location=me-west1 \
            --quiet || true

      - name: Build and push Docker image
        run: |
          docker build -t me-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hasheket-runner/hasheket-runner:${{ github.sha }} .
          docker push me-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hasheket-runner/hasheket-runner:${{ github.sha }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hasheket-runner
          region: me-west1
          image: me-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hasheket-runner/hasheket-runner:${{ github.sha }}
          flags: >
            --memory=2Gi
            --cpu=1
            --timeout=3600
            --min-instances=0
            --max-instances=1
            --set-env-vars=GMAIL_SERVICE_ACCOUNT_B64=${{ secrets.GMAIL_SERVICE_ACCOUNT_B64 }},API_SECRET_KEY=${{ secrets.API_SECRET_KEY }},TEST_GMAIL_IMPERSONATE=avigail@hspension.co.il
