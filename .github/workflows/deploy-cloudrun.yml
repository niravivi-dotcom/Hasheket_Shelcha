name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/hasheket-runner:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/hasheket-runner:${{ github.sha }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hasheket-runner
          region: me-west1
          image: ghcr.io/${{ github.repository_owner }}/hasheket-runner:${{ github.sha }}
          flags: >
            --memory=2Gi
            --cpu=1
            --timeout=3600
            --min-instances=0
            --max-instances=1
            --set-env-vars=GMAIL_SERVICE_ACCOUNT_B64=${{ secrets.GMAIL_SERVICE_ACCOUNT_B64 }}
